version: '3.8'

services:

  postgres:
    image: postgis/postgis:15-3.3
    container_name: goldenminute-db
    environment:
      POSTGRES_DB: goldenminute
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: